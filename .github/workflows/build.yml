name: Build and Push Silverblue Slimbook

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'LICENSE']
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if nothing upstream changed'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  IMAGE_NAME: silverblue-slimbook
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BASE_IMAGE: quay.io/fedora-ostree-desktops/silverblue
  BASE_TAG: '44'
  DEFAULT_SLIMBOOK_FEDORA: '43'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      base_digest:  ${{ steps.upstream.outputs.base_digest }}
      base_version: ${{ steps.upstream.outputs.base_version }}
      slimbook_fedora: ${{ steps.upstream.outputs.slimbook_fedora }}
      slimbook_hash: ${{ steps.upstream.outputs.slimbook_hash }}
    steps:
      - name: Inspect upstream
        id: upstream
        run: |
          set -euxo pipefail

          BASE_INSPECT=$(skopeo inspect "docker://${BASE_IMAGE}:${BASE_TAG}")
          echo "base_digest=$(jq -r '.Digest'                  <<<"$BASE_INSPECT")" >> "$GITHUB_OUTPUT"
          echo "base_version=$(jq -r '.Labels["ostree.linux"]' <<<"$BASE_INSPECT")" >> "$GITHUB_OUTPUT"

          # Auto-bump SLIMBOOK_FEDORA to 44 when the OBS dir appears
          if curl -sfI "https://download.opensuse.org/repositories/home:/Slimbook/Fedora_44/repodata/repomd.xml" >/dev/null; then
            SLIMBOOK_FEDORA=44
          else
            SLIMBOOK_FEDORA="${DEFAULT_SLIMBOOK_FEDORA}"
          fi
          echo "slimbook_fedora=${SLIMBOOK_FEDORA}" >> "$GITHUB_OUTPUT"

          SLIMBOOK_HASH=$(curl -sfL "https://download.opensuse.org/repositories/home:/Slimbook/Fedora_${SLIMBOOK_FEDORA}/repodata/repomd.xml" | sha256sum | awk '{print $1}')
          echo "slimbook_hash=${SLIMBOOK_HASH}" >> "$GITHUB_OUTPUT"

      - name: Decide whether to build
        id: decide
        env:
          BASE_DIGEST:   ${{ steps.upstream.outputs.base_digest }}
          SLIMBOOK_HASH: ${{ steps.upstream.outputs.slimbook_hash }}
          FORCE_BUILD:   ${{ inputs.force_build }}
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "push" || "${FORCE_BUILD}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          LAST_LABELS=$(skopeo inspect "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:latest" 2>/dev/null \
                        | jq -r '.Labels // {}' || echo '{}')
          LAST_BASE=$(jq -r '."com.slimbook.base_digest"   // ""' <<<"$LAST_LABELS")
          LAST_SLIM=$(jq -r '."com.slimbook.slimbook_hash" // ""' <<<"$LAST_LABELS")
          if [[ "$LAST_BASE" != "$BASE_DIGEST" || "$LAST_SLIM" != "$SLIMBOOK_HASH" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk
        run: sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=stable
            type=raw,value=f${{ env.BASE_TAG }}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=Silverblue Slimbook Executive
            org.opencontainers.image.description=Fedora ${{ env.BASE_TAG }} Silverblue + Slimbook hardware enablement
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.slimbook.base_digest=${{ needs.check.outputs.base_digest }}
            com.slimbook.base_version=${{ needs.check.outputs.base_version }}
            com.slimbook.slimbook_hash=${{ needs.check.outputs.slimbook_hash }}
            com.slimbook.slimbook_fedora=${{ needs.check.outputs.slimbook_fedora }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BASE_TAG=${{ env.BASE_TAG }}
            SLIMBOOK_FEDORA=${{ needs.check.outputs.slimbook_fedora }}
            SLIMBOOK_DIGEST=${{ needs.check.outputs.slimbook_hash }}
          secrets: |
            mok_priv=${{ secrets.MOK_PRIVATE_KEY_B64 }}
            mok_der=${{ secrets.MOK_PUBLIC_KEY_B64 }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euxo pipefail
          cosign sign --yes "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
